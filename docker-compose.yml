version: '3.9'

services:
  # ================================================================
  # PostgreSQL with RLS support
  # ================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ivdr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ivdr_db
      POSTGRES_USER: ivdr_user
      POSTGRES_PASSWORD: ivdr_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ivdr_user -d ivdr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================================================
  # Redis — cache, rate limiting, presence TTL
  # ================================================================
  redis:
    image: redis:7-alpine
    container_name: ivdr-redis
    restart: unless-stopped
    command: redis-server --requirepass ivdr_redis_secret --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ivdr_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================================================
  # Zookeeper (required by Kafka)
  # ================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ivdr-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  # ================================================================
  # Kafka broker
  # ================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ivdr-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.producer.async.DefaultEventHandler=WARN,state.change.logger=WARN"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ================================================================
  # MinIO — local S3-compatible object storage
  # ================================================================
  minio:
    image: minio/minio:latest
    container_name: ivdr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ivdr_minio_user
      MINIO_ROOT_PASSWORD: ivdr_minio_secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ================================================================
  # Spring Boot Application
  # ================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ivdr-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ivdr_db
      DB_USERNAME: ivdr_user
      DB_PASSWORD: ivdr_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ivdr_redis_secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_BUCKET: ivdr-documents
      AWS_ACCESS_KEY_ID: ivdr_minio_user
      AWS_SECRET_ACCESS_KEY: ivdr_minio_secret
      AWS_REGION: us-east-1
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-256-bit-key-here}
      JWT_ACCESS_EXPIRY_MS: 900000
      JWT_REFRESH_EXPIRY_MS: 604800000
      AI_API_KEY: ${AI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  minio_data:
