spring:
  application:
    name: ivdr-document-management

  # ============================================================
  # DataSource & JPA
  # ============================================================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ivdr_db}?currentSchema=public
    username: ${DB_USERNAME:ivdr_user}
    password: ${DB_PASSWORD:ivdr_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: IvdrHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000


  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema; Hibernate only validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ============================================================
  # Flyway Migrations
  # ============================================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ============================================================
  # Redis
  # ============================================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:ivdr_redis_secret}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # ============================================================
  # Kafka
  # ============================================================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                    # Strongest durability guarantee
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        delivery.timeout.ms: 120000
    consumer:
      group-id: ivdr-audit-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ivdr.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.ivdr.domain.audit.event.AuditEvent
        max.poll.records: 100
        session.timeout.ms: 30000

  # ============================================================
  # WebSocket / STOMP
  # ============================================================
  websocket:
    allowed-origins: "*"

  # ============================================================
  # Cache
  # ============================================================
  cache:
    type: redis
    redis:
      time-to-live: 600000       # 10 minutes default TTL

# ============================================================
# Server
# ============================================================
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  http2:
    enabled: true
  servlet:
    context-path: /api/v1
  error:
    include-stacktrace: never
    include-message: always

# ============================================================
# Application-specific settings
# ============================================================
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-at-least-256-bits-long-key}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}      # 15 minutes
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000} # 7 days
    issuer: ivdr-system

  security:
    allowed-origins: http://localhost:3000,http://localhost:5173,https://ivdr.yourdomain.com
    max-failed-logins: 5
    lockout-duration-minutes: 15

  storage:
    s3:
      endpoint: ${AWS_S3_ENDPOINT:}        # empty = use real AWS
      bucket: ${AWS_S3_BUCKET:ivdr-documents}
      region: ${AWS_REGION:ap-southeast-1}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      max-file-size-mb: 100
      presigned-url-expiry-minutes: 15

  kafka:
    topics:
      audit-events: ivdr.audit.events
      audit-dlq: ivdr.audit.events.DLT
      presence-events: ivdr.presence.events
    partitions: 3
    replication-factor: 1

  rate-limit:
    download:
      max-requests: 100
      window-seconds: 60
    upload:
      max-requests: 20
      window-seconds: 60

  audit:
    signing-key: ${JWT_SECRET:change-me-in-production-at-least-256-bits-long-key}

  ai:
    provider: ${AI_PROVIDER:anthropic}         # anthropic | openai
    api-key: ${AI_API_KEY:}
    anthropic:
      base-url: https://api.anthropic.com
      model: claude-3-5-haiku-20241022
      max-tokens: 4096
    openai:
      base-url: https://api.openai.com/v1
      model: gpt-4o-mini
      max-tokens: 4096
    timeout-seconds: 30

  presence:
    session-ttl-seconds: 30                    # Redis TTL for presence keys

  anomaly:
    thresholds:
      downloads-per-hour: 50
      failed-logins-per-minute: 5
      unique-docs-per-hour: 30

# ============================================================
# Actuator / Observability
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.ivdr: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

# ============================================================
# OpenAPI / Swagger UI
# ============================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

---
# Docker profile overrides
spring:
  config:
    activate:
      on-profile: docker
  jpa:
    show-sql: false
logging:
  level:
    com.ivdr: INFO
